<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B 站评论图片抓取系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .video-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        .video-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .video-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9em;
            color: #666;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .stat-badge {
            background: #10b981;
        }
        .image-badge {
            background: #f59e0b;
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 50px;
            padding: 20px;
        }
        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            margin-top: 30px;
        }
        .empty-state h2 {
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .empty-state p {
            opacity: 0.9;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 B 站评论图片抓取系统</h1>
        <p class="subtitle">Browser 自动化 + 智能图片处理 + 在线报告生成</p>
        
        <div class="video-list">
            <!-- 视频 1: BV15QAUzXEtP -->
            <a href="BV15QAUzXEtP/" class="video-card">
                <div class="video-title">🎮 生化危机 9 Crash 崩溃报错</div>
                <div class="video-info">
                    <div class="info-item">
                        <span class="badge">BV15QAUzXEtP</span>
                    </div>
                    <div class="info-item">
                        <span class="badge stat-badge">📊 7 条评论</span>
                        <span class="badge image-badge">🖼️ 7 张图片</span>
                    </div>
                    <div class="info-item">
                        <span>📅 抓取时间：2026-04-02</span>
                    </div>
                </div>
            </a>
            
            <!-- 更多视频会在这里添加 -->
            
            <!-- 空状态（当没有视频时显示，有视频时隐藏） -->
            <!--
            <div class="empty-state">
                <h2>🎯 暂无视频报告</h2>
                <p>使用抓取脚本处理第一个视频后，报告会显示在这里</p>
                <p style="margin-top: 15px; font-size: 0.9em;">运行：python3 bili_5comments.py</p>
            </div>
            -->
        </div>
        
        <div class="footer">
            <p>🏹 小猎（Hunter）· 信息捕手 | 专注信息获取和整理</p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                <a href="https://github.com/Zoopools/bili-comments" target="_blank" style="color: rgba(255,255,255,0.8);">GitHub 仓库</a>
            </p>
        </div>
    </div>
</body>
</html>
